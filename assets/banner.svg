<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="1000" height="250"
     role="img" aria-label="Project Management System — Object-Oriented Design, UML, Java">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#5B6EE8"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5B6EE8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#A5B4FC" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#5B6EE8" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        values="-1 0; 1 0; -1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="titleClip">
      <text x="60" y="96" font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
            font-size="42" font-weight="700" letter-spacing="-0.6">Project Management System</text>
    </clipPath>
  </defs>

  <style><![CDATA[
    /* Colours chosen to read on both the light and the dark GitHub theme,
       since prefers-color-scheme is not reliable for an SVG loaded as an image. */
    .muted  { fill: #8B93A7; }
    .track  { fill: #8B93A7; opacity: .22; }

    /* Every animated element's *resting* state is its finished state, so the
       banner still reads correctly if animations never run (reduced motion,
       or a renderer that snapshots the first frame). */
    .fade  { animation: fade .9s ease-out both; }
    .d1 { animation-delay: .05s } .d2 { animation-delay: .30s } .d3 { animation-delay: .55s }
    @keyframes fade { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: none } }

    .rule { transform-box: fill-box; transform-origin: left center;
            animation: grow .8s .5s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes grow { from { transform: scaleX(0) } to { transform: scaleX(1) } }

    /* the five life-cycle phases fill one after another, then reset */
    .bar { transform-box: fill-box; transform-origin: left center;
           animation: phase 7.5s cubic-bezier(.4,0,.2,1) infinite backwards; }
    .b1 { animation-delay: .6s } .b2 { animation-delay: 1.7s } .b3 { animation-delay: 2.8s }
    .b4 { animation-delay: 3.9s } .b5 { animation-delay: 5.0s }
    @keyframes phase {
      0%   { transform: scaleX(0) }
      11%  { transform: scaleX(1) }
      85%  { transform: scaleX(1) }
      100% { transform: scaleX(0) }
    }

    .dot { opacity: .35; animation: pulse 7.5s ease-in-out infinite backwards; }
    .p1 { animation-delay: .6s } .p2 { animation-delay: 1.7s } .p3 { animation-delay: 2.8s }
    .p4 { animation-delay: 3.9s } .p5 { animation-delay: 5.0s }
    @keyframes pulse { 0%,4% { opacity: 0 } 8% { opacity: 1 } 20%,100% { opacity: .35 } }

    @media (prefers-reduced-motion: reduce) {
      .fade, .rule, .bar, .dot { animation: none }
    }
  ]]></style>

  <!-- brand mark -->
  <g class="fade d1">
    <rect x="60" y="28" width="34" height="34" rx="9" fill="url(#accent)"/>
    <text x="77" y="52" text-anchor="middle" fill="#fff" font-size="18" font-weight="700"
          font-family="Helvetica Neue,Helvetica,Arial,sans-serif">A</text>
    <text x="106" y="52" class="muted" font-size="13" font-weight="600" letter-spacing="2.4"
          font-family="Helvetica Neue,Helvetica,Arial,sans-serif">SOFTWARE LAB — II</text>
  </g>

  <!-- title + sweeping sheen -->
  <g class="fade d2">
    <text x="60" y="96" fill="url(#accent)" font-size="42" font-weight="700" letter-spacing="-0.6"
          font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Project Management System</text>
    <g clip-path="url(#titleClip)">
      <rect x="-1000" y="60" width="3000" height="50" fill="url(#sheen)" opacity=".55"/>
    </g>
  </g>

  <rect class="rule" x="60" y="112" width="120" height="3" rx="2" fill="url(#accent)"/>

  <text x="60" y="142" class="muted fade d3" font-size="15"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif">
    An object-oriented model of a software house · UML · Java 11 · no dependencies
  </text>

  <!-- animated development life cycle -->
  <g font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="11">
    <text x="60" y="178" class="muted" font-size="10" font-weight="700" letter-spacing="1.6">DEVELOPMENT LIFE CYCLE</text>

    <g transform="translate(60,192)">
      <rect class="track" x="0"   y="0" width="164" height="6" rx="3"/>
      <rect class="track" x="180" y="0" width="164" height="6" rx="3"/>
      <rect class="track" x="360" y="0" width="164" height="6" rx="3"/>
      <rect class="track" x="540" y="0" width="164" height="6" rx="3"/>
      <rect class="track" x="720" y="0" width="164" height="6" rx="3"/>

      <rect class="bar b1" x="0"   y="0" width="164" height="6" rx="3" fill="#22C55E"/>
      <rect class="bar b2" x="180" y="0" width="164" height="6" rx="3" fill="#22C55E"/>
      <rect class="bar b3" x="360" y="0" width="164" height="6" rx="3" fill="#22C55E"/>
      <rect class="bar b4" x="540" y="0" width="164" height="6" rx="3" fill="#22C55E"/>
      <rect class="bar b5" x="720" y="0" width="164" height="6" rx="3" fill="url(#accent)"/>

      <circle class="dot p1" cx="164" cy="3" r="3" fill="#22C55E"/>
      <circle class="dot p2" cx="344" cy="3" r="3" fill="#22C55E"/>
      <circle class="dot p3" cx="524" cy="3" r="3" fill="#22C55E"/>
      <circle class="dot p4" cx="704" cy="3" r="3" fill="#22C55E"/>
      <circle class="dot p5" cx="884" cy="3" r="3" fill="#8B5CF6"/>

      <text x="0"   y="26" class="muted">Requirement &amp; Feasibility</text>
      <text x="180" y="26" class="muted">Development</text>
      <text x="360" y="26" class="muted">Testing</text>
      <text x="540" y="26" class="muted">Deployment</text>
      <text x="720" y="26" class="muted">Maintenance</text>
    </g>
  </g>
</svg>
